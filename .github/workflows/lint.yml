name: Lint

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install flake8
        run: pip install flake8

      - name: Lint client/
        run: |
          flake8 client/ \
            --max-line-length=120 \
            --ignore=E221,E241,E251,E203,E226,E265,E302,W503,W292,F541 \
            --exclude=__pycache__

      - name: Lint coordinator/
        run: |
          flake8 coordinator/ \
            --max-line-length=120 \
            --ignore=E221,E241,E251,E203,E226,E265,E302,W503,W292,F541 \
            --exclude=__pycache__

      - name: Lint shared/
        run: |
          flake8 shared/ \
            --max-line-length=120 \
            --ignore=E221,E241,E251,E203,E226,E265,E302,W503,W292,F541 \
            --exclude=__pycache__